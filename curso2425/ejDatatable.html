<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ejemplo Datatable</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
          crossorigin="anonymous"></script>
  <link href="https://cdn.datatables.net/2.3.5/css/dataTables.dataTables.min.css" rel="stylesheet"/>
</head>
<body>
<div class="container bg-primary text-white">
  <table id="miTablaEjemplo" class="table table-striped table-bordered" style="width:100%">
    <thead class="">
    <tr>
      <th>Nombre</th>
      <th>Posición</th>
      <th>Oficina</th>
      <th>Edad</th>
    </tr>
    </thead>
    <tbody>
    <tr>
      <td>Ana García</td>
      <td>Desarrolladora</td>
      <td>Madrid</td>
      <td>32</td>
    </tr>
    <tr>
      <td>Luis Sanz</td>
      <td>Diseñador</td>
      <td>Barcelona</td>
      <td>28</td>
    </tr>
    <tr>
      <td>Juan Martín</td>
      <td>Gerente</td>
      <td>Sevilla</td>
      <td>32</td>
    </tr>
    <tr>
      <td>Roberto Pérez</td>
      <td>Técnico</td>
      <td>Huelva</td>
      <td>34</td>
    </tr>
    </tbody>
  </table>
</div>
<script src="https://code.jquery.com/jquery-3.7.0.js"></script>
<script src="https://cdn.datatables.net/2.3.5/js/dataTables.min.js"></script>
<script>
  $(document).ready(function () {
    $('#miTablaEjemplo').DataTable();
  });
</script>
</body>
</html>
