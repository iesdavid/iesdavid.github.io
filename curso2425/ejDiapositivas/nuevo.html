<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nuevo</title>
</head>
<body>
<input type="number" id="numero">
<button id="envio">Enviar</button>
<p id="resultado">Dame un número</p>
<script>
  console.log(1 + 2 === 3);
  let envio = document.getElementById("envio");
  envio.addEventListener("click", function () {
    let num = document.getElementById("numero").value;
    document.getElementById("resultado").textContent = num;
  });
</script>
</body>
</html>
